<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - NFe Agro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #27C47A;
            color: white;
            padding: 0.75rem 1rem;
        }

        .header .title {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .header .back {
            font-size: 1.5rem;
            cursor: pointer;
        }

        .content {
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-section {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 5vw;
            text-align: center;
            margin-bottom: 3rem;
        }

        .profile-name {
            color: #196E3B;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            margin-bottom: 2rem;
            margin: auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5vw;
            margin-top: 15vw;
            color: #196E3B;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
        }

        .section-header .add-btn {
            background-color: transparent;
            border: none;
            color: #27C47A;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
        }

        .item {
            background-color: #c6f9c1;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #004d26;
        }

        .item-content {
            flex: 1;
        }

        .item-action {
            margin-left: 1rem;
            cursor: pointer;
        }

        .item-action .material-symbols-outlined {
            color: #c6f9c1;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <header class="header">
        <span class="material-symbols-outlined back" onclick="window.location.href='home.html'">arrow_back_ios</span>
        <span class="title">Ajustes</span>
    </header>

    <div class="content">

        <div class="profile-section">

            <div class="profile-name">Produtor Nome</div>
            <span class="material-symbols-outlined">edit</span>

        </div>

        
    </div>

    <div class="section">
        <div class="section-header">
            <span>CNPJs</span>
            <button class="add-btn" onclick="adicionarCNPJ()">+</button>
        </div>
        <div class="item-list">
            <div class="item">
                <div class="item-content">00.000.000/0001-00</div>
            </div>
            <div class="item">
                <div class="item-content">00.000.000/0001-01</div>
            </div>
            <div class="item">
                <div class="item-content">00.000.000/0001-02</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span>Certificado Digital</span>
            <button class="add-btn" onclick="adicionarCertificado()">+</button>
        </div>
        <div class="item-list">
            <div class="item">
                <div class="item-content">00000000000000000000</div>
                <div class="item-action">
                    <span class="material-symbols-outlined">edit</span>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script>
        function adicionarCNPJ() {
            alert('Adicionar novo CNPJ');
        }
        function adicionarCertificado() {
            alert('Adicionar novo certificado');
        }
    </script>
</body>

</html>
