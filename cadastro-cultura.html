<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Culturas - NFe Agro</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #27C47A;
      color: white;
      padding: 0.75rem 1rem;
      position: fixed;
      width: 100%;
      z-index: 1000;
      top: 0;
    }
    .header .title {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .header .back {
      font-size: 1.5rem;
      cursor: pointer;
    }
    .content {
      padding: 2rem 1rem 1rem 1rem;
      position: relative;
      margin-top: 4rem;
    }
    .page-title {
      text-align: center;
      color: #196E3B;
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 2rem;
      line-height: 1.3;
    }
    .add-button {
      position: absolute;
      top: 4.5rem;
      right: 1rem;
      background-color: transparent;
      color: #27C47A;
      border: none;
      font-size: 2.5rem;
      cursor: pointer;
      padding: 0;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 3rem;
    }
    .table th, .table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    .table th {
      background-color: #f2f2f2;
      font-weight: bold;
      color: #196E3B;
    }
    .table tr:hover {
      background-color: #f9f9f9;
    }
    .table .actions {
      display: flex;
      gap: 0.5rem;
    }
    .table .actions button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      background-color: #27C47A;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .table .actions button:hover {
      background-color: #1fa366;
    }
    
    /* Estilos do Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
    }
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background-color: white;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #196E3B;
    }
    .modal-close {
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
      border: none;
      background: none;
      padding: 0;
    }
    .modal-close:hover {
      color: #333;
    }
    .form-group {
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      font-weight: 500;
      color: #196E3B;
      margin-bottom: 0.5rem;
    }
    .form-group input,
    .form-group select {
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #27C47A;
      box-shadow: 0 0 0 3px rgba(39, 196, 122, 0.1);
    }
    .modal-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    .btn-cancel {
      flex: 1;
      padding: 0.75rem;
      background-color: #e60808;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      color: #ffffff;
    }
    .btn-cancel:hover {
      background-color: #e0e0e0;
    }
    .btn-save {
      flex: 1;
      padding: 0.75rem;
      background-color: #27C47A;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      color: white;
    }
    .btn-save:hover {
      background-color: #1fa366;
    }

    @media (max-width: 768px) {
      .table {
        font-size: 0.9rem;
      }
      .table th, .table td {
        padding: 0.5rem;
      }
      .table .actions button {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="material-symbols-outlined back" onclick="window.location.href='home.html'">arrow_back</span>
    <div class="title">Culturas</div>
  </div>
  <div class="content">
    <!-- <h1 class="page-title">Culturas Cadastradas</h1> -->
    <button class="add-button" id="add-cultura">+</button>
    <table class="table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Unidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="culturasTableBody">
      </tbody>
    </table>
  </div>
  
  <!-- Modal para adicionar cultura -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Nova Cultura</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      
      <form id="addForm">
        <div class="form-group">
          <label for="nome">Cultura</label>
          <input type="text" id="nome" name="nome" required>
        </div>
        <div class="form-group">
          <label for="unidade">Unidade Comercializada</label>
          <select id="unidade" name="unidade" required>
            <option value="">Selecione</option>
            <option value="un">Unidade (un)</option>
            <option value="sc">Saco (sc)</option>
            <option value="lt">Litro (lt)</option>
            <option value="tn">Tonelada (tn)</option>
          </select>
        </div>
        
        <div class="modal-buttons">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let culturas = [];
    const modal = document.getElementById('addModal');
    const btnAdicionar = document.getElementById('add-cultura');
    const addForm = document.getElementById('addForm');

    // Abrir modal
    btnAdicionar.addEventListener('click', function() {
      modal.classList.add('active');
    });

    // Fechar modal
    function closeModal() {
      modal.classList.remove('active');
      addForm.reset();
    }

    // Renderizar tabela
    function renderTable() {
      const tbody = document.getElementById('culturasTableBody');
      tbody.innerHTML = '';
      
      if (culturas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">Nenhuma cultura cadastrada</td></tr>';
        return;
      }

      culturas.forEach((cultura, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cultura.nome}</td>
          <td>${cultura.unidade.toUpperCase()}</td>
          <td class="actions">
            <button onclick="editCultura(${index})">Editar</button>
            <button onclick="deleteCultura(${index})">Excluir</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Salvar cultura
    addForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = document.getElementById('nome').value;
      const unidade = document.getElementById('unidade').value;
      
      culturas.push({ nome, unidade });
      renderTable();
      closeModal();
    });

    // Editar cultura
    function editCultura(index) {
      alert('Função de edição será implementada em breve');
    }

    // Deletar cultura
    function deleteCultura(index) {
      if (confirm('Deseja excluir esta cultura?')) {
        culturas.splice(index, 1);
        renderTable();
      }
    }

    // Fechar modal ao clicar fora
    window.addEventListener('click', function(event) {
      if (event.target === modal) {
        closeModal();
      }
    });

    // Renderizar tabela na carga
    renderTable();
  </script>
</body>
</html>
