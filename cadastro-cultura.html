<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Culturas - NFe Agro</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    .header {
      display: flex;
      align-items: center;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #27C47A;
      color: white;
      padding: 0.75rem 1rem;
      position: fixed;
      width: 100%;
      z-index: 1000;
    }
    .header .title {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .header .back {
      font-size: 1.5rem;
      cursor: pointer;
    }
    .content {
      padding: 2rem 1rem 1rem 1rem;
      position: relative;
    }
    .page-title {
      text-align: center;
      color: #196E3B;
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 2rem;
      line-height: 1.3;
      margin-top: 15vw;
    }
    .add-button {
      position: absolute;
      top: 1.5rem;
      right: 1rem;
      background-color: transparent;
      color: #27C47A;
      border: none;
      font-size: 2.5rem;
      cursor: pointer;
      margin-top: 15vw;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .table th, .table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    .table th {
      background-color: #f2f2f2;
      font-weight: bold;
    }
    .table tr:hover {
      background-color: #f9f9f9;
    }
    .table .actions {
      display: flex;
      gap: 0.5rem;
    }
    .table .actions button {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 500px;
      border-radius: 8px;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
    }
    @media (max-width: 768px) {
      .table {
        font-size: 0.9rem;
      }
      .table th, .table td {
        padding: 0.5rem;
      }
      .modal-content {
        width: 90%;
        margin: 20% auto;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    
    <span class="material-symbols-outlined back" onclick="window.location.href='home.html'">arrow_back</span>
    <div class="title">Cadastro de Culturas</div>

  </div>
  <div class="content">
    <h1 class="page-title">Culturas Cadastradas</h1>
    <button class="add-button" onclick="openModal()">+</button>
    <table class="table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="culturasTableBody">
        <!-- Linhas serão adicionadas dinamicamente -->
      </tbody>
    </table>
  </div>
  <!-- Modal para adicionar cultura -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Adicionar Cultura</h2>
      <form id="addForm">
        <div class="form-group">
          <label for="nome">Nome da Cultura</label>
          <input type="text" id="nome" name="nome" required>
        </div>
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" rows="3"></textarea>
        </div>
        <button type="submit" class="primary">Salvar</button>
      </form>
    </div>
  </div>
  <script>
    let culturas = []; // Array para armazenar culturas
    function openModal() {
      document.getElementById('addModal').style.display = 'block';
    }
    function closeModal() {
      document.getElementById('addModal').style.display = 'none';
      document.getElementById('addForm').reset();
    }
    function renderTable() {
      const tbody = document.getElementById('culturasTableBody');
      tbody.innerHTML = '';
      culturas.forEach((cultura, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cultura.nome}</td>
          <td>${cultura.descricao}</td>
          <td class="actions">
            <button onclick="editCultura(${index})">Editar</button>
            <button onclick="deleteCultura(${index})">Excluir</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }
    document.getElementById('addForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = document.getElementById('nome').value;
      const descricao = document.getElementById('descricao').value;
      culturas.push({ nome, descricao });
      renderTable();
      closeModal();
    });
    function editCultura(index) {
      // Implementar edição se necessário
      alert('Editar não implementado ainda');
    }
    function deleteCultura(index) {
      culturas.splice(index, 1);
      renderTable();
    }
    // Fechar modal ao clicar fora
    window.onclick = function(event) {
      const modal = document.getElementById('addModal');
      if (event.target == modal) {
        closeModal();
      }
    }
  </script>
</body>
</html>
